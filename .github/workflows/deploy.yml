name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'sass/**'
      - 'static/**'
      - 'worker/**'
      - 'scripts/**'
      - 'config.toml'
      - 'wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2
        with:
          tool: zola@0.19.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Generate glossary
        run: npx tsx scripts/generate-glossary.ts

      - name: Build
        run: zola build

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Index content
        run: npx tsx scripts/index-content.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
