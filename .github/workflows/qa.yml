name: QA

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2
        with:
          tool: zola@0.19.2

      - name: Generate glossary
        run: npx tsx scripts/generate-glossary.ts

      - name: Verify generated glossary is committed
        run: |
          git diff --exit-code content/glossary.md || (echo "ERROR: Generated glossary differs from committed version. Run 'npx tsx scripts/generate-glossary.ts' and commit the result." && exit 1)

      - name: Generate hero SVGs
        run: npx tsx scripts/generate-hero-svgs.ts

      - name: Verify generated heroes are committed
        run: |
          git diff --exit-code static/heroes/ || (echo "ERROR: Generated hero SVGs differ from committed versions. Run 'npx tsx scripts/generate-hero-svgs.ts' and commit the results." && exit 1)

      - name: Zola build
        run: zola build

      - name: Zola link check
        run: zola check
