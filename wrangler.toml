#:schema node_modules/wrangler/config-schema.json
name = "wtf-fnord-lol"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "public"
binding = "ASSETS"

[[routes]]
pattern = "wtf.fnord.lol"
custom_domain = true

[observability]
enabled = true

[[vectorize]]
binding = "VECTORIZE"
index_name = "wtf-content"

[ai]
binding = "AI"

[vars]
OAUTH_CLIENT_ID = "wtf-fnord-lol"
OAUTH_ISSUER = "https://id.27b.io"
