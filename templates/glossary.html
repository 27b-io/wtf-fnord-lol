{% extends "base.html" %}

{% block title %}Glossary · {{ config.title }}{% endblock %}

{% block content %}
<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="post-lede">{{ page.description }}</p>
    {% endif %}
  </div>
  <div class="prose glossary-page">
    {{ page.content | safe }}
  </div>
</article>
{% endblock %}
